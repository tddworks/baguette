<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simulator — focus</title>
<style>
  /* Standalone preview tokens — at runtime sim-native.js extracts the
     #simNativeView block + sibling <style>, so this :root only matters
     when this file is opened directly via file://. */
  :root {
    --bg: #f8fafc;
    --text: #334155;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
               font: 400 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif; }
</style>
</head>
<body>
<!--
  Focus mode template. sim-native.js extracts everything inside
  #simNativeView (plus the <style> below) and injects it when the
  page is loaded directly at /simulators/<udid>.

  No fake window, no bottom HUD. The whole UI is one slim
  translucent bar at the top carrying every control:

    [← iPhone 17 Pro Max · iOS 26.4]    [60 fps  H.264|MJPEG  🏠 📷 🪟]

  The device floats free on the dark page below — biggest possible
  device, least possible chrome.
-->
<style>
  #simNativeView {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 12px;
    box-sizing: border-box;
    background: transparent;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }

  /* SwiftUI-style VStack: toolbar pill above the device, both
     centered horizontally, stacked vertically with a small gap.
     Each child keeps its own intrinsic width; nothing stretches
     to match the other. */
  #simNativeView .device-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    max-height: 100%;
    min-width: 0;
  }

  /* Toolbar pill — its own content-based width (label + controls).
     Sits directly above the device as the upper child of the
     VStack. */
  #simNativeView .top-bar {
    display: inline-flex; align-items: center;
    flex-shrink: 0;
    gap: 12px;
    height: 36px;
    padding: 4px 6px 4px 4px;
    background: rgba(20, 20, 24, 0.78);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 999px;
    box-shadow:
      0 8px 24px rgba(0, 0, 0, 0.45),
      0 1px 0 rgba(255, 255, 255, 0.05) inset;
    backdrop-filter: blur(18px) saturate(1.5);
    -webkit-backdrop-filter: blur(18px) saturate(1.5);
    color: #f5f5f7;
    max-width: 100%;
  }

  /* `!important` overrides device-frame.js's inline `max-height: 70vh`
     on both the wrapper <div> and the bezel <img> — those defaults
     are tuned for the sidebar layout and would cap the device to
     70% of the viewport here. The 68px subtracts the toolbar
     (36px) + column gap (8px) + container padding (24px). */
  #simNativeView #nativeDeviceFrame,
  #simNativeView #nativeDeviceFrame > div {
    max-height: calc(100vh - 68px) !important;
    max-width: 100% !important;
  }
  #simNativeView #nativeDeviceFrame img,
  #simNativeView #nativeDeviceFrame canvas {
    max-height: calc(100vh - 68px) !important;
    max-width: 100% !important;
  }

  /* Label group — clickable, returns to the simulator list. The
     chevron + device name + OS subtitle read as one breadcrumb. */
  #simNativeView .tb-label {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 10px 4px 8px;
    border-radius: 999px;
    color: inherit; text-decoration: none;
    transition: background 0.12s ease;
    min-width: 0; /* enable ellipsis inside the flex item */
  }
  #simNativeView .tb-label:hover { background: rgba(255, 255, 255, 0.10); }
  #simNativeView .tb-label .tb-back {
    color: rgba(245, 245, 247, 0.55);
    flex-shrink: 0;
  }
  #simNativeView .tb-label .tb-name {
    color: #f5f5f7;
    font: 600 13px/1.1 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    letter-spacing: 0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 22ch;
  }
  #simNativeView .tb-label .tb-os {
    color: rgba(245, 245, 247, 0.5);
    font: 500 11px/1.1 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    white-space: nowrap;
    padding-left: 2px;
    border-left: 1px solid rgba(255, 255, 255, 0.12);
  }

  /* Right-side controls cluster: fps badge · format picker · actions. */
  #simNativeView .tb-controls {
    display: inline-flex; align-items: center; gap: 8px;
    padding-right: 4px;
  }

  /* fps — small monospace label. Hidden until the stream reports a
     value so the bar isn't carrying dead text on startup. */
  #simNativeView #nativeStatus {
    color: rgba(245, 245, 247, 0.55);
    font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
    white-space: nowrap;
    padding: 0 2px;
  }
  #simNativeView #nativeStatus:empty { display: none; }

  /* Format segmented control. Active is filled blue; the other is
     a quiet ghost that lifts on hover. */
  #simNativeView .fmt-picker {
    display: inline-flex; align-items: stretch;
    padding: 2px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 999px;
  }
  #simNativeView .fmt-btn {
    appearance: none; -webkit-appearance: none;
    border: 0; padding: 0 10px; height: 22px;
    background: transparent; color: rgba(245, 245, 247, 0.65);
    font: 700 10px/1 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    letter-spacing: 0.04em;
    border-radius: 999px; cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease;
  }
  #simNativeView .fmt-btn:hover { color: #f5f5f7; }
  #simNativeView .fmt-btn.active {
    background: #2563eb; color: #fff;
    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.25);
  }

  /* Action buttons — Home / Screenshot / App-switcher. */
  #simNativeView .tb-actions {
    display: inline-flex; align-items: center; gap: 2px;
  }
  #simNativeView .ico-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 28px; padding: 0;
    background: transparent; border: 0; border-radius: 8px;
    color: rgba(245, 245, 247, 0.92); cursor: pointer;
    transition: background 0.12s ease;
  }
  #simNativeView .ico-btn:hover { background: rgba(255, 255, 255, 0.10); }
  #simNativeView .ico-btn:active { background: rgba(255, 255, 255, 0.18); }
  #simNativeView .ico-btn svg { display: block; }

  /* Narrow viewports — drop the OS subtitle and the fps badge so
     the bar collapses gracefully instead of wrapping. */
  @media (max-width: 560px) {
    #simNativeView .tb-label .tb-os { display: none; }
    #simNativeView #nativeStatus { display: none; }
    #simNativeView .top-bar { gap: 8px; }
  }
  @media (max-width: 420px) {
    #simNativeView .fmt-picker { display: none; }
    #simNativeView .tb-label .tb-name { max-width: 16ch; }
  }

  /* Preview ribbon — only when opened via file:// */
  #simNativeView .preview-banner {
    display: none; position: fixed; top: 10px; right: 10px; z-index: 999;
    padding: 4px 10px; border-radius: 6px;
    background: rgba(234,179,8,.18); border: 1px solid rgba(234,179,8,.5);
    color: #facc15; font: 700 10px -apple-system, sans-serif; letter-spacing: .14em;
  }
  body.preview #simNativeView .preview-banner { display: block; }
</style>

<div id="simNativeView">
  <span class="preview-banner">PREVIEW</span>

  <div class="device-column">
  <div class="top-bar" role="toolbar" aria-label="Simulator controls">
    <a class="tb-label" id="nativeBackLink" href="/simulators" title="Back to simulators">
      <svg class="tb-back" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span class="tb-name" id="nativeDeviceName">iPhone</span>
      <span class="tb-os"   id="nativeDeviceOS">iOS</span>
    </a>

    <div class="tb-controls">
      <span id="nativeStatus"></span>

      <div class="fmt-picker" id="nativeFormatPicker" role="group" aria-label="Stream format">
        <button class="fmt-btn" data-v="avcc"  title="H.264 (hardware-decoded). Smaller, more compressed."
                onclick="window.__nativeSetFormat && window.__nativeSetFormat('avcc')">H.264</button>
        <button class="fmt-btn" data-v="mjpeg" title="MJPEG. Higher bandwidth, lower latency."
                onclick="window.__nativeSetFormat && window.__nativeSetFormat('mjpeg')">MJPEG</button>
      </div>

      <div class="tb-actions">
        <button class="ico-btn" title="Home" onclick="window.__nativeHome && window.__nativeHome()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
               stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
            <path d="M3 11.2 12 4l9 7.2"/>
            <path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/>
          </svg>
        </button>
        <button class="ico-btn" title="Screenshot" onclick="window.__nativeScreenshot && window.__nativeScreenshot()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
               stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
            <path d="M4 8.5A1.5 1.5 0 0 1 5.5 7h2L9 5h6l1.5 2h2A1.5 1.5 0 0 1 20 8.5V18a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 18z"/>
            <circle cx="12" cy="13" r="3.5"/>
          </svg>
        </button>
        <button class="ico-btn" title="Lock" onclick="window.__nativeLock && window.__nativeLock()">
          <!-- "App-switcher" glyph mirroring the native Simulator
               toolbar's third icon — two overlapping rounded squares. -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
               stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
            <rect x="3"  y="7"  width="13" height="13" rx="2.2"/>
            <path d="M8 7V5.2A2.2 2.2 0 0 1 10.2 3H19a2 2 0 0 1 2 2v8.8A2.2 2.2 0 0 1 18.8 16H17"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

    <div id="nativeDeviceFrame"></div>
  </div>
</div>

<script>
  // Preview bootstrap — only when the file is opened directly. Lets
  // designers iterate on the chrome without booting a simulator.
  (function () {
    if (location.protocol !== 'file:') return;
    document.body.classList.add('preview');
    document.body.style.cssText = 'margin:0;background:#1a1a1f';
    document.getElementById('nativeDeviceName').textContent = 'iPhone 17 Pro Max';
    document.getElementById('nativeDeviceOS').textContent = 'iOS 26.4';
    var host = document.getElementById('nativeDeviceFrame');
    var img = document.createElement('img');
    img.src = '../frames/iPhone 17 Pro Max.png';
    img.style.cssText = 'display:block;height:88vh;max-height:calc(100vh - 72px);pointer-events:none';
    host.appendChild(img);
    document.querySelector('.fmt-btn[data-v="avcc"]').classList.add('active');
    document.getElementById('nativeStatus').textContent = '60 fps';
  })();
</script>
</body>
</html>
