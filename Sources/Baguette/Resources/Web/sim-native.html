<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simulator — focus</title>
<style>
  /* Standalone preview tokens — at runtime sim-native.js extracts the
     #simNativeView block + sibling <style>, so this :root only matters
     when this file is opened directly via file://. */
  :root {
    --bg: #f8fafc;
    --text: #334155;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
               font: 400 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif; }
</style>
</head>
<body>
<!--
  Focus mode template. sim-native.js extracts everything inside
  #simNativeView (plus the <style> below) and injects it when the
  page is loaded directly at /simulators/<udid>.

  No fake macOS window — the device floats free on the page and a
  single glass toolbar at the bottom carries the device label,
  action buttons (Home / Screenshot / App-switcher), the format
  picker, and the live fps. Less chrome, more device.
-->
<style>
  #simNativeView {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 24px 88px;  /* 88px reserves room for the toolbar */
    box-sizing: border-box;
    background: transparent;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }

  /* Device floats free. Sized from the available viewport so it
     dominates the page; aspect ratio comes from the bezel <img>. */
  #simNativeView #nativeDeviceFrame {
    position: relative; display: inline-block;
    max-height: calc(100vh - 24px - 88px);
  }
  #simNativeView #nativeDeviceFrame img,
  #simNativeView #nativeDeviceFrame canvas {
    max-height: calc(100vh - 24px - 88px);
  }

  /* Floating bottom toolbar. One glass pill carrying everything:
       [device label]  ·  [actions]  ·  [format picker]  ·  [fps]
     Each section is divided by a hairline so the groups read as
     distinct controls without needing extra rows. */
  #simNativeView .float-bar {
    position: fixed; bottom: 22px; left: 50%;
    transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 8px;
    background: rgba(20, 20, 24, 0.78);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 999px;
    box-shadow:
      0 12px 36px rgba(0, 0, 0, 0.55),
      0 1px 0 rgba(255, 255, 255, 0.05) inset;
    backdrop-filter: blur(18px) saturate(1.5);
    -webkit-backdrop-filter: blur(18px) saturate(1.5);
    color: #f5f5f7;
    max-width: calc(100vw - 24px);
  }
  #simNativeView .fb-divider {
    width: 1px; height: 18px;
    background: rgba(255, 255, 255, 0.12);
  }

  /* Device label — clickable, returns to the simulator list.
     Subtle chevron hints at the back action without shouting. */
  #simNativeView .fb-label {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px 4px 8px;
    border-radius: 999px;
    color: inherit; text-decoration: none;
    transition: background 0.12s ease;
  }
  #simNativeView .fb-label:hover { background: rgba(255, 255, 255, 0.08); }
  #simNativeView .fb-label .fb-back {
    color: rgba(245, 245, 247, 0.55);
    flex-shrink: 0;
  }
  #simNativeView .fb-label .fb-name {
    color: #f5f5f7;
    font: 600 12px/1 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    letter-spacing: 0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 22ch;
  }
  #simNativeView .fb-label .fb-os {
    color: rgba(245, 245, 247, 0.5);
    font: 500 11px/1 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    white-space: nowrap;
  }

  /* Action button group — Home / Screenshot / App switcher. */
  #simNativeView .fb-actions {
    display: inline-flex; align-items: center; gap: 2px;
  }
  #simNativeView .fb-actions .ico-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 28px; padding: 0;
    background: transparent; border: 0; border-radius: 8px;
    color: rgba(245, 245, 247, 0.92); cursor: pointer;
    transition: background 0.12s ease;
  }
  #simNativeView .fb-actions .ico-btn:hover { background: rgba(255, 255, 255, 0.10); }
  #simNativeView .fb-actions .ico-btn:active { background: rgba(255, 255, 255, 0.18); }
  #simNativeView .fb-actions .ico-btn svg { display: block; }

  /* Format segmented control. Active button is filled blue; the
     other is a quiet ghost button. */
  #simNativeView .fmt-picker {
    display: inline-flex; align-items: stretch;
    padding: 2px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 999px;
  }
  #simNativeView .fmt-btn {
    appearance: none; -webkit-appearance: none;
    border: 0; padding: 0 10px; height: 22px;
    background: transparent; color: rgba(245, 245, 247, 0.65);
    font: 700 10px/1 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    letter-spacing: 0.04em;
    border-radius: 999px; cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease;
  }
  #simNativeView .fmt-btn:hover { color: #f5f5f7; }
  #simNativeView .fmt-btn.active {
    background: #2563eb; color: #fff;
    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.25);
  }

  /* Live fps. Hidden when empty so the toolbar collapses on
     stream startup before the first frame is decoded. */
  #simNativeView #nativeStatus {
    color: rgba(245, 245, 247, 0.55);
    font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
    padding: 0 8px 0 2px;
    white-space: nowrap;
  }
  #simNativeView #nativeStatus:empty { display: none; }
  #simNativeView #nativeStatus:empty + .fb-divider { display: none; }

  /* Narrow viewports — drop the device label down to just the
     back chevron + name (hide the OS subtitle). */
  @media (max-width: 520px) {
    #simNativeView .fb-label .fb-os { display: none; }
    #simNativeView .float-bar { gap: 6px; padding: 5px 6px; }
    #simNativeView .fb-actions .ico-btn { width: 28px; height: 26px; }
  }

  /* Preview ribbon — only when opened via file:// */
  #simNativeView .preview-banner {
    display: none; position: fixed; top: 10px; right: 10px; z-index: 999;
    padding: 4px 10px; border-radius: 6px;
    background: rgba(234,179,8,.18); border: 1px solid rgba(234,179,8,.5);
    color: #facc15; font: 700 10px -apple-system, sans-serif; letter-spacing: .14em;
  }
  body.preview #simNativeView .preview-banner { display: block; }
</style>

<div id="simNativeView">
  <span class="preview-banner">PREVIEW</span>

  <div id="nativeDeviceFrame"></div>

  <div class="float-bar" role="toolbar" aria-label="Simulator controls">
    <a class="fb-label" id="nativeBackLink" href="/simulators" title="Back to simulators">
      <svg class="fb-back" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span class="fb-name" id="nativeDeviceName">iPhone</span>
      <span class="fb-os"   id="nativeDeviceOS">iOS</span>
    </a>

    <span class="fb-divider"></span>

    <div class="fb-actions">
      <button class="ico-btn" title="Home" onclick="window.__nativeHome && window.__nativeHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
          <path d="M3 11.2 12 4l9 7.2"/>
          <path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/>
        </svg>
      </button>
      <button class="ico-btn" title="Screenshot" onclick="window.__nativeScreenshot && window.__nativeScreenshot()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
          <path d="M4 8.5A1.5 1.5 0 0 1 5.5 7h2L9 5h6l1.5 2h2A1.5 1.5 0 0 1 20 8.5V18a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 18z"/>
          <circle cx="12" cy="13" r="3.5"/>
        </svg>
      </button>
      <button class="ico-btn" title="Lock" onclick="window.__nativeLock && window.__nativeLock()">
        <!-- "Stack of windows" glyph mirroring the native Simulator
             toolbar's app-switcher icon — two overlapping rounded squares. -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
             stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
          <rect x="3"  y="7"  width="13" height="13" rx="2.2"/>
          <path d="M8 7V5.2A2.2 2.2 0 0 1 10.2 3H19a2 2 0 0 1 2 2v8.8A2.2 2.2 0 0 1 18.8 16H17"/>
        </svg>
      </button>
    </div>

    <span class="fb-divider"></span>

    <div class="fmt-picker" id="nativeFormatPicker" role="group" aria-label="Stream format">
      <button class="fmt-btn" data-v="avcc"  title="H.264 (hardware-decoded). Smaller, more compressed."
              onclick="window.__nativeSetFormat && window.__nativeSetFormat('avcc')">H.264</button>
      <button class="fmt-btn" data-v="mjpeg" title="MJPEG. Higher bandwidth, lower latency."
              onclick="window.__nativeSetFormat && window.__nativeSetFormat('mjpeg')">MJPEG</button>
    </div>

    <span id="nativeStatus"></span>
    <span class="fb-divider"></span>
  </div>
</div>

<script>
  // Preview bootstrap — only when the file is opened directly. Lets
  // designers iterate on the chrome without booting a simulator.
  (function () {
    if (location.protocol !== 'file:') return;
    document.body.classList.add('preview');
    document.body.style.cssText = 'margin:0;background:#1a1a1f';
    document.getElementById('nativeDeviceName').textContent = 'iPhone 17 Pro Max';
    document.getElementById('nativeDeviceOS').textContent = 'iOS 26.4';
    var host = document.getElementById('nativeDeviceFrame');
    var img = document.createElement('img');
    img.src = '../frames/iPhone 17 Pro Max.png';
    img.style.cssText = 'display:block;height:88vh;max-height:calc(100vh - 112px);pointer-events:none';
    host.appendChild(img);
    // Reflect a default active format for the preview.
    document.querySelector('.fmt-btn[data-v="avcc"]').classList.add('active');
    document.getElementById('nativeStatus').textContent = '60 fps';
  })();
</script>
</body>
</html>
