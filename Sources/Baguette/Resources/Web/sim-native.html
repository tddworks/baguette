<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simulator — focus</title>
<style>
  /* Standalone preview tokens — at runtime sim-native.js extracts the
     #simNativeView block + sibling <style>, so this :root only matters
     when this file is opened directly via file://. */
  :root {
    --bg: #f8fafc;
    --text: #334155;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
               font: 400 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif; }
</style>
</head>
<body>
<!--
  Focus mode template. sim-native.js extracts everything inside
  #simNativeView (plus the <style> below) and injects it when the
  page is loaded directly at /simulators/<udid>. Mirrors the macOS
  Simulator window chrome — traffic lights, centered title, top-right
  action toolbar, and the device on a soft gradient stage.
-->
<style>
  #simNativeView {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    background: transparent;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  /* macOS-Simulator style window: shrink-wraps the device + toolbar.
     The dark area around it is the body / page background, so the
     window reads as a real proxy for the desktop Simulator app
     rather than a full-page chrome. */
  #simNativeView .native-window {
    position: relative;
    display: inline-flex; flex-direction: column;
    background: #2a2a30;
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    box-shadow:
      0 18px 50px rgba(0, 0, 0, 0.55),
      0 1px 0 rgba(255, 255, 255, 0.05) inset;
    overflow: hidden;
    max-width: calc(100vw - 32px);
    max-height: calc(100vh - 80px);
  }
  /* macOS Simulator toolbar — slim translucent bar, no gradient.
     The bar floats over the stage with a soft dark blur so the
     device content runs right up to the chrome edge. */
  #simNativeView .native-titlebar {
    position: relative;
    display: flex; align-items: center;
    height: 30px;
    padding: 0 10px;
    background: rgba(36, 36, 40, 0.78);
    border-bottom: 1px solid rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(18px) saturate(1.4);
    -webkit-backdrop-filter: blur(18px) saturate(1.4);
  }
  #simNativeView .traffic-lights { display: flex; gap: 7px; align-items: center; }
  #simNativeView .tl {
    width: 10px; height: 10px; border-radius: 50%;
    border: 0.5px solid rgba(0, 0, 0, 0.25);
    cursor: default;
  }
  #simNativeView .tl-red    { background: #ff5f57; }
  #simNativeView .tl-yellow { background: #febc2e; }
  #simNativeView .tl-green  { background: #28c840; }
  #simNativeView .tl-red    { cursor: pointer; }
  #simNativeView .tl-red:hover    { filter: brightness(1.08); }

  #simNativeView .native-title {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    text-align: center; pointer-events: none;
    line-height: 1.15;
    /* Cap so the centered title can't slide under the right-side
       action group on narrow viewports. The action group has a
       higher z-index as a belt-and-braces guard for very-narrow
       windows where even the cap isn't enough. */
    max-width: min(60vw, 320px);
    z-index: 1;
  }
  #simNativeView .native-actions { z-index: 2; }
  #simNativeView .title-name {
    color: #f5f5f7;
    font: 600 12px/1.2 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    letter-spacing: 0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #simNativeView .title-os {
    color: rgba(245, 245, 247, 0.55);
    font: 500 10px/1.2 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    margin-top: 1px;
  }

  #simNativeView .native-actions {
    margin-left: auto;
    display: flex; align-items: center; gap: 4px;
  }
  #simNativeView .native-actions .ico-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 22px; padding: 0;
    background: transparent; border: none; border-radius: 5px;
    color: rgba(245, 245, 247, 0.92); cursor: pointer;
    transition: background 0.12s ease;
  }
  #simNativeView .native-actions .ico-btn:hover { background: rgba(255, 255, 255, 0.10); }
  #simNativeView .native-actions .ico-btn:active { background: rgba(255, 255, 255, 0.18); }
  #simNativeView .native-actions .ico-btn svg { display: block; }

  /* Floating HUD: format picker + fps badge. Sits OUTSIDE the
     window on the page background — the desktop area around the
     simulator window. The flex column on #simNativeView (gap: 14px)
     places it directly under the window, centered on the page. */
  #simNativeView .native-hud {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 6px;
    background: rgba(20, 20, 24, 0.78);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 999px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
  }
  #simNativeView .fmt-picker {
    display: inline-flex; align-items: stretch;
    padding: 2px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 999px;
  }
  #simNativeView .fmt-btn {
    appearance: none; -webkit-appearance: none;
    border: 0; padding: 0 10px; height: 20px;
    background: transparent; color: rgba(245, 245, 247, 0.65);
    font: 700 10px/1 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    letter-spacing: 0.04em;
    border-radius: 999px; cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease;
  }
  #simNativeView .fmt-btn:hover { color: #f5f5f7; }
  #simNativeView .fmt-btn.active {
    background: #2563eb; color: #fff;
    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.25);
  }

  #simNativeView .native-stage {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    padding: 10px 12px 12px;
    overflow: hidden;
  }
  /* Device sizes from the available viewport (minus the title bar,
     stage padding, the HUD row below the window, and a small
     safety margin). The window shrink-wraps to whatever width the
     bezel's aspect ratio resolves to. */
  #simNativeView #nativeDeviceFrame {
    position: relative; display: inline-block;
    max-height: calc(100vh - 30px - 22px - 56px);
  }
  #simNativeView #nativeDeviceFrame img,
  #simNativeView #nativeDeviceFrame canvas {
    max-height: calc(100vh - 30px - 22px - 56px);
  }

  /* fps badge — sits inside the floating bottom HUD next to the
     format picker. Hidden until the stream reports a frame rate. */
  #simNativeView #nativeStatus {
    color: rgba(245, 245, 247, 0.55);
    font: 500 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
    padding: 0 6px 0 2px;
  }
  #simNativeView #nativeStatus:empty { display: none; }

  /* Preview ribbon — only when opened via file:// */
  #simNativeView .preview-banner {
    display: none; position: fixed; top: 10px; right: 10px; z-index: 999;
    padding: 4px 10px; border-radius: 6px;
    background: rgba(234,179,8,.18); border: 1px solid rgba(234,179,8,.5);
    color: #facc15; font: 700 10px -apple-system, sans-serif; letter-spacing: .14em;
  }
  body.preview #simNativeView .preview-banner { display: block; }
</style>

<div id="simNativeView">
  <span class="preview-banner">PREVIEW</span>

  <div class="native-window">
    <div class="native-titlebar">
      <div class="traffic-lights">
        <span class="tl tl-red" title="Close" onclick="window.__nativeClose && window.__nativeClose()"></span>
        <span class="tl tl-yellow" title="Minimize"></span>
        <span class="tl tl-green" title="Zoom"></span>
      </div>
      <div class="native-title">
        <div class="title-name" id="nativeDeviceName">iPhone</div>
        <div class="title-os" id="nativeDeviceOS">iOS</div>
      </div>
      <div class="native-actions">
        <button class="ico-btn" title="Home" onclick="window.__nativeHome && window.__nativeHome()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
            <path d="M3 11.2 12 4l9 7.2"/>
            <path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/>
          </svg>
        </button>
        <button class="ico-btn" title="Screenshot" onclick="window.__nativeScreenshot && window.__nativeScreenshot()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
            <path d="M4 8.5A1.5 1.5 0 0 1 5.5 7h2L9 5h6l1.5 2h2A1.5 1.5 0 0 1 20 8.5V18a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 18z"/>
            <circle cx="12" cy="13" r="3.5"/>
          </svg>
        </button>
        <button class="ico-btn" title="Lock" onclick="window.__nativeLock && window.__nativeLock()">
          <!-- "Stack of windows" glyph mirroring the native Simulator
               toolbar's third icon — two overlapping rounded squares. -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
            <rect x="3"  y="7"  width="13" height="13" rx="2.2"/>
            <path d="M8 7V5.2A2.2 2.2 0 0 1 10.2 3H19a2 2 0 0 1 2 2v8.8A2.2 2.2 0 0 1 18.8 16H17"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="native-stage">
      <div id="nativeDeviceFrame"></div>
    </div>
  </div>

  <!-- HUD lives OUTSIDE the simulator window, on the page
       background below it. Mirrors how Apple's Simulator app sits
       on the desktop with floating overlays around it. -->
  <div class="native-hud">
    <div class="fmt-picker" id="nativeFormatPicker" role="group" aria-label="Stream format">
      <button class="fmt-btn" data-v="avcc"  title="H.264 (hardware-decoded). Smaller, more compressed."
              onclick="window.__nativeSetFormat && window.__nativeSetFormat('avcc')">H.264</button>
      <button class="fmt-btn" data-v="mjpeg" title="MJPEG. Higher bandwidth, lower latency."
              onclick="window.__nativeSetFormat && window.__nativeSetFormat('mjpeg')">MJPEG</button>
    </div>
    <span id="nativeStatus"></span>
  </div>
</div>

<script>
  // Preview bootstrap — only when the file is opened directly. Lets
  // designers iterate on the chrome without booting a simulator.
  (function () {
    if (location.protocol !== 'file:') return;
    document.body.classList.add('preview');
    document.getElementById('nativeDeviceName').textContent = 'iPhone 17 Pro Max';
    document.getElementById('nativeDeviceOS').textContent = 'iOS 26.4';
    var host = document.getElementById('nativeDeviceFrame');
    var img = document.createElement('img');
    img.src = '../frames/iPhone 17 Pro Max.png';
    img.style.cssText = 'display:block;height:78vh;max-height:calc(96vh - 84px);pointer-events:none';
    host.appendChild(img);
  })();
</script>
</body>
</html>
