<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simulator — focus</title>
<style>
  /* Standalone preview tokens — at runtime sim-native.js extracts the
     #simNativeView block + sibling <style>, so this :root only matters
     when this file is opened directly via file://. */
  :root {
    --bg: #f8fafc;
    --text: #334155;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
               font: 400 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, sans-serif; }
</style>
</head>
<body>
<!--
  Focus mode template. sim-native.js extracts everything inside
  #simNativeView (plus the <style> below) and injects it when the
  page is loaded directly at /simulators/<udid>. Mirrors the macOS
  Simulator window chrome — traffic lights, centered title, top-right
  action toolbar, and the device on a soft gradient stage.
-->
<style>
  #simNativeView {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 20% 0%, rgba(244,114,182,0.45) 0%, transparent 55%),
      radial-gradient(circle at 80% 100%, rgba(248,113,113,0.40) 0%, transparent 55%),
      linear-gradient(135deg, #1f1f29 0%, #2a1d2b 100%);
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  #simNativeView .native-window {
    position: relative;
    display: flex; flex-direction: column;
    max-width: 96vw; max-height: 96vh;
    background: rgba(28, 28, 32, 0.88);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    box-shadow:
      0 30px 90px rgba(0, 0, 0, 0.55),
      0 1px 0 rgba(255, 255, 255, 0.06) inset;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    overflow: hidden;
  }
  #simNativeView .native-titlebar {
    position: relative;
    display: flex; align-items: center;
    height: 44px;
    padding: 0 14px;
    background: linear-gradient(180deg, rgba(60, 60, 68, 0.92) 0%, rgba(42, 42, 50, 0.92) 100%);
    border-bottom: 1px solid rgba(0, 0, 0, 0.45);
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.05) inset;
  }
  #simNativeView .traffic-lights { display: flex; gap: 8px; align-items: center; }
  #simNativeView .tl {
    width: 12px; height: 12px; border-radius: 50%;
    border: 0.5px solid rgba(0, 0, 0, 0.35);
    cursor: default;
  }
  #simNativeView .tl-red    { background: #ff5f57; }
  #simNativeView .tl-yellow { background: #febc2e; }
  #simNativeView .tl-green  { background: #28c840; }
  #simNativeView .tl-red    { cursor: pointer; }
  #simNativeView .tl-red:hover    { filter: brightness(1.08); }

  #simNativeView .native-title {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    text-align: center; pointer-events: none;
    line-height: 1.15;
  }
  #simNativeView .title-name {
    color: #f5f5f7;
    font: 700 13px/1.2 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    letter-spacing: 0.01em;
  }
  #simNativeView .title-os {
    color: rgba(245, 245, 247, 0.55);
    font: 500 11px/1.2 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    margin-top: 1px;
  }

  #simNativeView .native-actions {
    margin-left: auto;
    display: flex; align-items: center; gap: 4px;
  }
  #simNativeView .native-actions .ico-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 28px; padding: 0;
    background: transparent; border: none; border-radius: 6px;
    color: #f5f5f7; cursor: pointer;
    transition: background 0.12s ease;
  }
  #simNativeView .native-actions .ico-btn:hover { background: rgba(255, 255, 255, 0.10); }
  #simNativeView .native-actions .ico-btn:active { background: rgba(255, 255, 255, 0.18); }
  #simNativeView .native-actions .ico-btn svg { display: block; }

  #simNativeView .native-stage {
    flex: 1; min-height: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 18px 22px 22px;
    overflow: hidden;
  }
  #simNativeView #nativeDeviceFrame {
    position: relative; display: inline-block;
    max-height: calc(96vh - 44px - 40px);
  }
  #simNativeView #nativeDeviceFrame img,
  #simNativeView #nativeDeviceFrame canvas {
    max-height: calc(96vh - 44px - 40px);
  }

  #simNativeView #nativeStatus {
    position: absolute; bottom: 10px; left: 50%;
    transform: translateX(-50%);
    color: rgba(245, 245, 247, 0.55);
    font: 500 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    pointer-events: none;
    font-variant-numeric: tabular-nums;
  }

  /* Preview ribbon — only when opened via file:// */
  #simNativeView .preview-banner {
    display: none; position: fixed; top: 10px; right: 10px; z-index: 999;
    padding: 4px 10px; border-radius: 6px;
    background: rgba(234,179,8,.18); border: 1px solid rgba(234,179,8,.5);
    color: #facc15; font: 700 10px -apple-system, sans-serif; letter-spacing: .14em;
  }
  body.preview #simNativeView .preview-banner { display: block; }
</style>

<div id="simNativeView">
  <span class="preview-banner">PREVIEW</span>

  <div class="native-window">
    <div class="native-titlebar">
      <div class="traffic-lights">
        <span class="tl tl-red" title="Close" onclick="window.__nativeClose && window.__nativeClose()"></span>
        <span class="tl tl-yellow" title="Minimize"></span>
        <span class="tl tl-green" title="Zoom"></span>
      </div>
      <div class="native-title">
        <div class="title-name" id="nativeDeviceName">iPhone</div>
        <div class="title-os" id="nativeDeviceOS">iOS</div>
      </div>
      <div class="native-actions">
        <button class="ico-btn" title="Home" onclick="window.__nativeHome && window.__nativeHome()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
               stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <path d="M3 11.5 12 4l9 7.5"/>
            <path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/>
          </svg>
        </button>
        <button class="ico-btn" title="Screenshot" onclick="window.__nativeScreenshot && window.__nativeScreenshot()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
               stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <path d="M4 8.5A1.5 1.5 0 0 1 5.5 7h2L9 5h6l1.5 2h2A1.5 1.5 0 0 1 20 8.5V18a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 4 18z"/>
            <circle cx="12" cy="13" r="3.5"/>
          </svg>
        </button>
        <button class="ico-btn" title="Lock" onclick="window.__nativeLock && window.__nativeLock()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
               stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <rect x="5" y="10.5" width="14" height="9.5" rx="2"/>
            <path d="M8 10.5V8a4 4 0 0 1 8 0v2.5"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="native-stage">
      <div id="nativeDeviceFrame"></div>
    </div>
  </div>

  <div id="nativeStatus">— fps</div>
</div>

<script>
  // Preview bootstrap — only when the file is opened directly. Lets
  // designers iterate on the chrome without booting a simulator.
  (function () {
    if (location.protocol !== 'file:') return;
    document.body.classList.add('preview');
    document.getElementById('nativeDeviceName').textContent = 'iPhone 17 Pro Max';
    document.getElementById('nativeDeviceOS').textContent = 'iOS 26.4';
    var host = document.getElementById('nativeDeviceFrame');
    var img = document.createElement('img');
    img.src = '../frames/iPhone 17 Pro Max.png';
    img.style.cssText = 'display:block;height:78vh;max-height:calc(96vh - 84px);pointer-events:none';
    host.appendChild(img);
  })();
</script>
</body>
</html>
