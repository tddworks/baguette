name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications | grep -i Xcode || true
          sudo xcode-select -p
          swift --version

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test
